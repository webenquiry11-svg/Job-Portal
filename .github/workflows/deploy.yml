name: Deploy Click4Jobs

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Ensure the shell uses the new Node and PM2 paths
            export PATH=/usr/local/bin:/root/.nvm/versions/node/v22.19.0/bin:$PATH
            
            cd /var/www/click4jobs
            git pull origin main
            
            # 2. Build and Restart Backend
            cd server
            npm install
            npm run build
            # Using the absolute path we found earlier
            pm2 restart click4jobs-api --update-env || pm2 start dist/index.js --name click4jobs-api
            
            # 3. Build Frontend
            cd ../client
            npm install
            npm run build
            # Sync permissions for Nginx
            sudo chown -R www-data:www-data out
            sudo chmod -R 755 out