<svg width="550" height="450" viewBox="0 0 550 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#DBEAFE;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#EFF6FF;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="4" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.1"/>
            </feComponentTransfer>
            <feMerge> 
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/> 
            </feMerge>
        </filter>
    </defs>
    <rect width="550" height="450" rx="20" fill="url(#grad1)"/>
    <g transform="translate(50, 50)" filter="url(#shadow)">
        <rect x="0" y="0" width="450" height="350" rx="15" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <circle cx="60" cy="60" r="25" fill="#BFDBFE"/>
        <rect x="100" y="45" width="150" height="12" rx="6" fill="#D1D5DB"/>
        <rect x="100" y="65" width="100" height="10" rx="5" fill="#E5E7EB"/>
        <rect x="35" y="110" width="380" height="8" rx="4" fill="#F3F4F6"/>
        <rect x="35" y="130" width="380" height="8" rx="4" fill="#F3F4F6"/>
        <rect x="35" y="150" width="320" height="8" rx="4" fill="#F3F4F6"/>
        <rect x="35" y="170" width="280" height="8" rx="4" fill="#F3F4F6"/>
    </g>
    <g transform="translate(250, 200)" filter="url(#shadow)">
        <rect x="0" y="0" width="250" height="200" rx="15" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <circle cx="50" cy="50" r="20" fill="#3B82F6"/>
        <path d="M45 50 L 49 54 L 56 47" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
        <rect x="80" y="38" width="120" height="10" rx="5" fill="#60A5FA"/>
        <rect x="80" y="55" width="80" height="8" rx="4" fill="#93C5FD"/>
        <rect x="30" y="100" width="190" height="8" rx="4" fill="#F3F4F6"/>
        <rect x="30" y="120" width="190" height="8" rx="4" fill="#F3F4F6"/>
        <rect x="30" y="140" width="150" height="8" rx="4" fill="#F3F4F6"/>
    </g>
</svg>